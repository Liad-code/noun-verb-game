<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noun or Verb? - English Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #e0e7ff 0%, #f0e6ff 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    user-select: none;
  }

  h1 {
    color: #1e293b;
    font-size: 2.2rem;
    margin-bottom: 5px;
  }

  .subtitle {
    color: #64748b;
    font-size: 1rem;
    margin-bottom: 20px;
  }

  .score-bar {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
    background: rgba(255,255,255,0.7);
    padding: 10px 25px;
    border-radius: 30px;
    color: #1e293b;
    font-size: 1.1rem;
    font-weight: 600;
  }

  .score-bar span {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .game-area {
    width: 100%;
    max-width: 800px;
  }

  .word-pool {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
    min-height: 70px;
    padding: 20px;
    background: rgba(255,255,255,0.5);
    border-radius: 16px;
    margin-bottom: 30px;
    border: 2px dashed #94a3b8;
  }

  .word-card {
    padding: 12px 22px;
    background: white;
    border-radius: 12px;
    font-size: 1.2rem;
    font-weight: 600;
    color: #333;
    cursor: grab;
    box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    transition: transform 0.15s, box-shadow 0.15s;
    touch-action: none;
  }

  .word-card:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 6px 20px rgba(0,0,0,0.25);
  }

  .word-card.dragging { opacity: 0.5; transform: scale(1.1); }

  .word-card.correct {
    background: #4ade80;
    color: white;
    cursor: default;
    animation: pop 0.4s ease;
  }

  .word-card.wrong {
    background: #f87171;
    color: white;
    animation: shake 0.5s ease;
  }

  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-10px); }
    40% { transform: translateX(10px); }
    60% { transform: translateX(-10px); }
    80% { transform: translateX(10px); }
  }

  .drop-zones {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  .drop-zone {
    background: white;
    border: 4px solid #cbd5e1;
    border-radius: 20px;
    padding: 25px;
    min-height: 220px;
    transition: background 0.2s, border-color 0.2s, transform 0.2s;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }

  .drop-zone.drag-over { transform: scale(1.02); }

  .drop-zone h2 {
    text-align: center;
    font-size: 1.6rem;
    margin-bottom: 5px;
    font-weight: 800;
  }

  .drop-zone .zone-hint {
    color: #64748b;
    text-align: center;
    font-size: 0.85rem;
    margin-bottom: 15px;
  }

  .drop-zone .zone-hint span { direction: rtl; unicode-bidi: bidi-override; }

  .drop-zone .sorted-words {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }

  .drop-zone .sorted-words .word-card {
    font-size: 1rem;
    padding: 8px 16px;
    cursor: default;
  }

  .noun-zone { background: #dbeafe; border-color: #3b82f6; }
  .noun-zone h2 { color: #1d4ed8; }
  .noun-zone.drag-over { background: #bfdbfe; border-color: #1d4ed8; box-shadow: 0 0 25px rgba(59,130,246,0.4); }

  .verb-zone { background: #f3e8ff; border-color: #a855f7; }
  .verb-zone h2 { color: #7e22ce; }
  .verb-zone.drag-over { background: #e9d5ff; border-color: #7e22ce; box-shadow: 0 0 25px rgba(168,85,247,0.4); }

  .round-complete {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 15px;
    margin-top: 30px;
  }

  .round-complete.show { display: flex; }

  .round-complete .message {
    color: #1e293b;
    font-size: 1.8rem;
    font-weight: 700;
  }

  .round-complete .stars { font-size: 2.5rem; }

  .btn {
    padding: 14px 35px;
    font-size: 1.2rem;
    font-weight: 700;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    color: white;
    background: linear-gradient(135deg, #f59e0b, #ef4444);
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    transition: transform 0.15s, box-shadow 0.15s;
  }

  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
  }

  .progress-bar {
    width: 100%;
    max-width: 800px;
    height: 8px;
    background: rgba(0,0,0,0.1);
    border-radius: 4px;
    margin-bottom: 20px;
    overflow: hidden;
  }

  .progress-bar .fill {
    height: 100%;
    background: linear-gradient(90deg, #4ade80, #22d3ee);
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  .touch-dragging {
    position: fixed;
    z-index: 1000;
    pointer-events: none;
    transform: scale(1.1);
    box-shadow: 0 8px 25px rgba(0,0,0,0.3);
  }

  .hint-box {
    width: 100%;
    max-width: 800px;
    margin-top: 25px;
    background: white;
    border: 3px solid #e2e8f0;
    border-radius: 16px;
    padding: 18px 22px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.06);
  }

  .hint-box h3 {
    color: #475569;
    font-size: 1rem;
    margin-bottom: 12px;
    text-align: center;
  }

  .hint-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 8px;
  }

  .hint-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 12px;
    background: #f8fafc;
    border-radius: 8px;
    border: 1px solid #e2e8f0;
  }

  .hint-item .en { font-weight: 600; color: #334155; font-size: 0.95rem; }
  .hint-item .he { color: #64748b; font-size: 0.95rem; direction: rtl; }

  @media (max-width: 600px) {
    h1 { font-size: 1.5rem; }
    .word-card { padding: 10px 16px; font-size: 1rem; }
    .drop-zone h2 { font-size: 1.2rem; }
    .drop-zones { gap: 12px; }
    .drop-zone { padding: 15px; min-height: 160px; }
  }
</style>
</head>
<body>

<h1>Noun or Verb?</h1>
<p class="subtitle">Drag each word to the correct box!</p>

<div class="score-bar">
  <span>&#11088; Score: <strong id="score">0</strong></span>
  <span>&#127942; Round: <strong id="round">1</strong> / <strong id="totalRounds">5</strong></span>
  <span>&#10004; Streak: <strong id="streak">0</strong></span>
</div>

<div class="progress-bar"><div class="fill" id="progressFill" style="width: 0%"></div></div>

<div class="game-area">
  <div class="word-pool" id="wordPool"></div>

  <div class="drop-zones">
    <div class="drop-zone noun-zone" id="nounZone" data-type="noun">
      <h2>Nouns</h2>
      <div class="zone-hint">Things, people, places<br><span>שמות עצם</span></div>
      <div class="sorted-words" id="nounWords"></div>
    </div>
    <div class="drop-zone verb-zone" id="verbZone" data-type="verb">
      <h2>Verbs</h2>
      <div class="zone-hint">Actions, doing words<br><span>פעלים</span></div>
      <div class="sorted-words" id="verbWords"></div>
    </div>
  </div>

  <div class="round-complete" id="roundComplete">
    <div class="stars" id="stars"></div>
    <div class="message" id="roundMessage"></div>
    <button class="btn" id="nextBtn" onclick="nextRound()">Next Round &#10145;</button>
  </div>
</div>

<div class="hint-box">
  <h3>Word List - רשימת מילים</h3>
  <div class="hint-grid" id="hintGrid"></div>
</div>

<script>
const ALL_WORDS = [
  { word: "dog", type: "noun", he: "כלב" },
  { word: "cat", type: "noun", he: "חתול" },
  { word: "book", type: "noun", he: "ספר" },
  { word: "school", type: "noun", he: "בית ספר" },
  { word: "house", type: "noun", he: "בית" },
  { word: "teacher", type: "noun", he: "מורה" },
  { word: "ball", type: "noun", he: "כדור" },
  { word: "water", type: "noun", he: "מים" },
  { word: "tree", type: "noun", he: "עץ" },
  { word: "friend", type: "noun", he: "חבר" },
  { word: "apple", type: "noun", he: "תפוח" },
  { word: "table", type: "noun", he: "שולחן" },
  { word: "city", type: "noun", he: "עיר" },
  { word: "family", type: "noun", he: "משפחה" },
  { word: "bird", type: "noun", he: "ציפור" },
  { word: "sun", type: "noun", he: "שמש" },
  { word: "flower", type: "noun", he: "פרח" },
  { word: "child", type: "noun", he: "ילד" },
  { word: "door", type: "noun", he: "דלת" },
  { word: "food", type: "noun", he: "אוכל" },
  { word: "game", type: "noun", he: "משחק" },
  { word: "pencil", type: "noun", he: "עיפרון" },
  { word: "fish", type: "noun", he: "דג" },
  { word: "mother", type: "noun", he: "אמא" },
  { word: "father", type: "noun", he: "אבא" },
  { word: "window", type: "noun", he: "חלון" },
  { word: "garden", type: "noun", he: "גינה" },
  { word: "student", type: "noun", he: "תלמיד" },
  { word: "music", type: "noun", he: "מוזיקה" },
  { word: "color", type: "noun", he: "צבע" },
  { word: "run", type: "verb", he: "לרוץ" },
  { word: "eat", type: "verb", he: "לאכול" },
  { word: "read", type: "verb", he: "לקרוא" },
  { word: "play", type: "verb", he: "לשחק" },
  { word: "sing", type: "verb", he: "לשיר" },
  { word: "jump", type: "verb", he: "לקפוץ" },
  { word: "write", type: "verb", he: "לכתוב" },
  { word: "sleep", type: "verb", he: "לישון" },
  { word: "walk", type: "verb", he: "ללכת" },
  { word: "swim", type: "verb", he: "לשחות" },
  { word: "draw", type: "verb", he: "לצייר" },
  { word: "cook", type: "verb", he: "לבשל" },
  { word: "think", type: "verb", he: "לחשוב" },
  { word: "talk", type: "verb", he: "לדבר" },
  { word: "drink", type: "verb", he: "לשתות" },
  { word: "dance", type: "verb", he: "לרקוד" },
  { word: "fly", type: "verb", he: "לעוף" },
  { word: "help", type: "verb", he: "לעזור" },
  { word: "open", type: "verb", he: "לפתוח" },
  { word: "close", type: "verb", he: "לסגור" },
  { word: "smile", type: "verb", he: "לחייך" },
  { word: "cry", type: "verb", he: "לבכות" },
  { word: "listen", type: "verb", he: "להקשיב" },
  { word: "climb", type: "verb", he: "לטפס" },
  { word: "catch", type: "verb", he: "לתפוס" },
  { word: "give", type: "verb", he: "לתת" },
  { word: "sit", type: "verb", he: "לשבת" },
  { word: "stand", type: "verb", he: "לעמוד" },
  { word: "laugh", type: "verb", he: "לצחוק" },
  { word: "wash", type: "verb", he: "לשטוף" },
];

const WORDS_PER_ROUND = 8;
const TOTAL_ROUNDS = 5;
let currentRound = 0;
let score = 0;
let streak = 0;
let sorted = 0;
let roundWords = [];
let roundMistakes = 0;

let touchDragEl = null;
let touchClone = null;

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function pickWords() {
  const nouns = shuffle(ALL_WORDS.filter(w => w.type === "noun")).slice(0, WORDS_PER_ROUND / 2);
  const verbs = shuffle(ALL_WORDS.filter(w => w.type === "verb")).slice(0, WORDS_PER_ROUND / 2);
  return shuffle([...nouns, ...verbs]);
}

function createWordCard(item) {
  const el = document.createElement("div");
  el.className = "word-card";
  el.textContent = item.word;
  el.dataset.type = item.type;
  el.draggable = true;

  el.addEventListener("dragstart", e => {
    el.classList.add("dragging");
    e.dataTransfer.setData("text/plain", item.word);
    e.dataTransfer.setData("type", item.type);
    e.dataTransfer.effectAllowed = "move";
  });
  el.addEventListener("dragend", () => el.classList.remove("dragging"));

  el.addEventListener("touchstart", handleTouchStart, { passive: false });
  el.addEventListener("touchmove", handleTouchMove, { passive: false });
  el.addEventListener("touchend", handleTouchEnd);

  return el;
}

function handleTouchStart(e) {
  e.preventDefault();
  const touch = e.touches[0];
  touchDragEl = e.currentTarget;

  touchClone = touchDragEl.cloneNode(true);
  touchClone.className = "word-card touch-dragging";
  const rect = touchDragEl.getBoundingClientRect();
  touchClone.style.width = rect.width + "px";
  touchClone.style.left = (touch.clientX - rect.width / 2) + "px";
  touchClone.style.top = (touch.clientY - 30) + "px";
  document.body.appendChild(touchClone);
  touchDragEl.classList.add("dragging");
}

function handleTouchMove(e) {
  e.preventDefault();
  if (!touchClone) return;
  const touch = e.touches[0];
  touchClone.style.left = (touch.clientX - touchClone.offsetWidth / 2) + "px";
  touchClone.style.top = (touch.clientY - 30) + "px";

  document.querySelectorAll(".drop-zone").forEach(zone => {
    const rect = zone.getBoundingClientRect();
    if (touch.clientX >= rect.left && touch.clientX <= rect.right &&
        touch.clientY >= rect.top && touch.clientY <= rect.bottom) {
      zone.classList.add("drag-over");
    } else {
      zone.classList.remove("drag-over");
    }
  });
}

function handleTouchEnd(e) {
  if (!touchClone || !touchDragEl) return;
  const touch = e.changedTouches[0];

  document.querySelectorAll(".drop-zone").forEach(zone => {
    zone.classList.remove("drag-over");
    const rect = zone.getBoundingClientRect();
    if (touch.clientX >= rect.left && touch.clientX <= rect.right &&
        touch.clientY >= rect.top && touch.clientY <= rect.bottom) {
      handleDrop(zone, touchDragEl.dataset.type, touchDragEl.textContent, touchDragEl);
    }
  });

  touchClone.remove();
  touchClone = null;
  touchDragEl.classList.remove("dragging");
  touchDragEl = null;
}

function handleDrop(zone, wordType, wordText, cardEl) {
  const zoneType = zone.dataset.type;
  const isCorrect = wordType === zoneType;

  if (isCorrect) {
    score += streak >= 3 ? 15 : 10;
    streak++;
    sorted++;

    const sortedContainer = zone.querySelector(".sorted-words");
    const mini = document.createElement("div");
    mini.className = "word-card correct";
    mini.textContent = wordText;
    sortedContainer.appendChild(mini);

    if (cardEl && cardEl.parentNode) cardEl.remove();
    updateUI();

    if (sorted >= WORDS_PER_ROUND) endRound();
  } else {
    roundMistakes++;
    streak = 0;
    score = Math.max(0, score - 5);

    if (cardEl) {
      cardEl.classList.add("wrong");
      setTimeout(() => cardEl.classList.remove("wrong"), 500);
    }
    updateUI();
  }
}

function setupDropZone(zone) {
  zone.addEventListener("dragover", e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = "move";
    zone.classList.add("drag-over");
  });
  zone.addEventListener("dragleave", () => zone.classList.remove("drag-over"));
  zone.addEventListener("drop", e => {
    e.preventDefault();
    zone.classList.remove("drag-over");
    const wordType = e.dataTransfer.getData("type");
    const wordText = e.dataTransfer.getData("text/plain");
    const cardEl = document.querySelector(".word-card.dragging");
    handleDrop(zone, wordType, wordText, cardEl);
  });
}

function updateUI() {
  document.getElementById("score").textContent = score;
  document.getElementById("round").textContent = currentRound + 1;
  document.getElementById("streak").textContent = streak;
  const totalSorted = currentRound * WORDS_PER_ROUND + sorted;
  const totalWords = TOTAL_ROUNDS * WORDS_PER_ROUND;
  document.getElementById("progressFill").style.width = (totalSorted / totalWords * 100) + "%";
}

function endRound() {
  const panel = document.getElementById("roundComplete");
  const starsEl = document.getElementById("stars");
  const msgEl = document.getElementById("roundMessage");
  const btn = document.getElementById("nextBtn");

  let starCount = roundMistakes === 0 ? 3 : roundMistakes <= 2 ? 2 : 1;
  starsEl.textContent = "\u2B50".repeat(starCount);

  if (currentRound >= TOTAL_ROUNDS - 1) {
    msgEl.textContent = "Game Over! Final score: " + score;
    btn.textContent = "Play Again \uD83D\uDD04";
    btn.onclick = () => { score = 0; streak = 0; currentRound = 0; updateUI(); nextRound(); };
  } else {
    const messages = ["Amazing! \uD83C\uDF89", "Great job! \uD83D\uDCAA", "Well done! \uD83C\uDF1F", "Keep going! \uD83D\uDE80", "You're a star! \u2728"];
    msgEl.textContent = messages[Math.floor(Math.random() * messages.length)];
    btn.textContent = "Next Round \u27A1";
    btn.onclick = nextRound;
  }

  panel.classList.add("show");
}

function nextRound() {
  document.getElementById("roundComplete").classList.remove("show");
  sorted = 0;
  roundMistakes = 0;

  if (currentRound > 0 || document.getElementById("wordPool").children.length === 0) {
    if (document.getElementById("wordPool").children.length === 0 && currentRound === 0) {
    } else {
      currentRound++;
      if (currentRound >= TOTAL_ROUNDS) currentRound = 0;
    }
  }

  roundWords = pickWords();
  const pool = document.getElementById("wordPool");
  pool.innerHTML = "";
  document.getElementById("nounWords").innerHTML = "";
  document.getElementById("verbWords").innerHTML = "";

  const hintGrid = document.getElementById("hintGrid");
  hintGrid.innerHTML = "";
  roundWords.forEach(item => {
    pool.appendChild(createWordCard(item));
    const hint = document.createElement("div");
    hint.className = "hint-item";
    hint.innerHTML = '<span class="en">' + item.word + '</span><span class="he">' + item.he + '</span>';
    hintGrid.appendChild(hint);
  });

  updateUI();
}

setupDropZone(document.getElementById("nounZone"));
setupDropZone(document.getElementById("verbZone"));
nextRound();
</script>

</body>
</html>
